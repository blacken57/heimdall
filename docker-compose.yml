services:
  heimdall:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - heimdall-data:/data
    environment:
      SERVICE_1_NAME: "Example"
      SERVICE_1_URL: "https://example.com"
      POLL_INTERVAL: "60"
      # Uncomment to enable basic auth:
      # HEIMDALL_USER: admin
      # HEIMDALL_PASSWORD: changeme

volumes:
  heimdall-data:
