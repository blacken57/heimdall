{{define "day_detail"}}
<div class="day-detail-backdrop" onclick="this.closest('.day-detail').innerHTML=''"></div>
<div class="day-detail-popup">
  <div class="day-detail-header">
    <span class="day-detail-title">{{.DateLabel}} — hourly breakdown</span>
    <button class="day-detail-close" onclick="this.closest('.day-detail').innerHTML=''" aria-label="close">×</button>
  </div>
  <div class="hourly-bar-segments">
    {{range .Hours}}
    <div class="hourly-seg hourly-seg--{{.Color}}" title="{{.Tooltip}}"></div>
    {{end}}
  </div>
  <div class="uptime-bar-labels">
    <span>00:00</span>
    <span>23:00</span>
  </div>
</div>
{{end}}
